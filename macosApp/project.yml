name: macosApp
options:
  bundleIdPrefix: com.shish.kaltswitch
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  # Tiny CLI helper bundled in `Contents/MacOS/`. The main app spawns it
  # at launch; it watches our pid via kqueue NOTE_EXIT and restores the
  # private symbolic hotkeys on death. Sole reason for being a separate
  # process: outlives SIGKILL / SIGSEGV / kernel-panic of the main app,
  # which an in-process signal handler can't.
  KAltSwitchWatchdog:
    type: tool
    platform: macOS
    sources:
      - path: Watchdog
    settings:
      base:
        PRODUCT_NAME: KAltSwitchWatchdog
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        # SkyLight is linked for the same `_CGSSetSymbolicHotKeyEnabled`
        # private symbol the main app uses.
        OTHER_LDFLAGS:
          - "-framework"
          - "SkyLight"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "/System/Library/PrivateFrameworks"

  macosApp:
    type: application
    platform: macOS
    sources:
      - path: macosApp
    dependencies:
      - target: KAltSwitchWatchdog
        # Embed the watchdog binary in `Contents/MacOS/` so
        # `Bundle.main.path(forAuxiliaryExecutable:)` can find it. Code-
        # sign on copy so the embedded binary inherits our adhoc
        # signature (otherwise launching it from a sandboxed/signed app
        # would fail signature validation).
        embed: true
        copy:
          destination: executables
          codeSign: true
    info:
      path: macosApp/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "15.0"
        CFBundleDisplayName: KAltSwitch
        NSHighResolutionCapable: true
    entitlements:
      path: macosApp/macosApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        # Renames the .app bundle, the executable, and CFBundleName to
        # KAltSwitch — the target is still called `macosApp` for build-tree
        # stability (changing target name churns derived-data paths and the
        # configuration cache key).
        PRODUCT_NAME: KAltSwitch
        # Drop the `.macosApp` target-name suffix from the bundle ID — it was
        # leaking into TCC (Accessibility permissions DB), where the System
        # Settings entry was named "macosApp.app" forever.
        PRODUCT_BUNDLE_IDENTIFIER: com.shish.kaltswitch
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # SkyLight is a private framework; we use it for symbolic-hot-key
        # disable + cross-process focus (see SkyLight.swift). alt-tab-macos
        # and similar tools link the same way.
        OTHER_LDFLAGS:
          - "-framework"
          - "ComposeAppMac"
          - "-framework"
          - "SkyLight"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(BUILT_PRODUCTS_DIR)"
          - "/System/Library/PrivateFrameworks"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: "Build Compose framework via Gradle"
        script: |
          set -e
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
            echo "Skipping Gradle build (OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES)"
            exit 0
          fi
          cd "$SRCROOT/.."
          ./gradlew :sharedUI:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
